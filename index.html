<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFF9EE">
<meta name="description" content="Bé ôn tập hè Lớp 1 lên Lớp 2 – Toán và Tiếng Việt theo sách Kết nối tri thức.">
<title>Bé Ôn Tập – Lớp 1 lên Lớp 2</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FFF9EE; --ink:#2B5FB8; --ink-dark:#1D3F7A;
  --red:#E84855; --star:#FFC94D; --green:#3BB273;
  --line:#E8DFC8; --text:#3A3A3A;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Nunito',sans-serif;color:var(--text);
  background:var(--paper);
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:26px 26px;
  position:relative;
}
body::before{
  content:'';position:fixed;top:0;bottom:0;left:34px;width:2px;
  background:rgba(232,72,85,.35);z-index:0;pointer-events:none;
}
#app{max-width:520px;margin:0 auto;padding:20px 18px 40px;position:relative;z-index:1;min-height:100%}
h1,h2,.display{font-family:'Baloo 2',cursive}

/* ---- header ---- */
.top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.top .back{
  border:none;background:#fff;border:2px solid var(--ink);color:var(--ink);
  width:42px;height:42px;border-radius:12px;font-size:20px;font-weight:800;cursor:pointer;
  box-shadow:0 3px 0 var(--ink);flex:none;
}
.top .back:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}
.crumb{font-weight:700;color:var(--ink-dark);font-size:15px}

/* ---- home ---- */
.hero{text-align:center;padding:26px 10px 18px}
.hero .mascot{font-size:58px;line-height:1}
.hero h1{font-size:30px;color:var(--ink-dark);letter-spacing:.5px;margin-top:6px}
.hero h1 .accent{color:var(--red)}
.hero p{font-size:15px;color:#7a715e;margin-top:4px;font-weight:700}
.starbar{margin:10px auto 0;display:inline-flex;gap:6px;background:#fff;border:2px solid var(--star);
  border-radius:999px;padding:6px 16px;font-weight:800;color:#a8760a;font-size:15px;align-items:center}

.subject{display:grid;gap:14px;margin-top:18px}

/* ---- chọn môn (màn hình chính) ---- */
.subjectpick{display:grid;gap:16px;margin-top:22px}
.subjcard{background:#fff;border:2.5px solid var(--ink);border-radius:20px;padding:20px 18px;
  box-shadow:0 5px 0 var(--ink);cursor:pointer;display:flex;align-items:center;gap:16px;transition:transform .08s}
.subjcard:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink)}
.subjcard .sc-emoji{font-size:46px;line-height:1;flex:none}
.subjcard .sc-name{font-family:'Baloo 2',cursive;font-size:26px;color:var(--ink-dark);line-height:1.1}
.subjcard .sc-meta{font-size:14px;color:#8a8272;font-weight:700;margin-top:4px}
.subjcard .sc-stars{display:inline-block;margin-top:8px;font-weight:800;font-size:13px;color:#a8760a;
  background:#fff8e6;border:2px solid var(--star);border-radius:999px;padding:3px 11px}
.subjcard .sc-arrow{margin-left:auto;flex:none;font-family:'Baloo 2',cursive;font-size:36px;color:var(--ink);line-height:1}
.subjcard.tv{border-color:var(--red);box-shadow:0 5px 0 var(--red)}
.subjcard.tv:active{box-shadow:0 1px 0 var(--red)}
.subjcard.tv .sc-name{color:#a02730}
.subjcard.tv .sc-arrow{color:var(--red)}
.card{
  background:#fff;border:2.5px solid var(--ink);border-radius:18px;padding:16px 18px;
  box-shadow:0 4px 0 var(--ink);cursor:pointer;display:flex;gap:14px;align-items:center;
  transition:transform .08s;
}
.card:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink)}
.card .icon{font-size:38px;flex:none}
.card .t{font-family:'Baloo 2',cursive;font-size:20px;color:var(--ink-dark)}
.card .d{font-size:13.5px;color:#8a8272;font-weight:700}
.card.tv{border-color:var(--red);box-shadow:0 4px 0 var(--red)}
.card.tv:active{box-shadow:0 1px 0 var(--red)}
.card.tv .t{color:#a02730}
.card .best{margin-left:auto;flex:none;text-align:center;font-size:12px;font-weight:800;color:#a8760a}
.card .best b{display:block;font-size:18px;font-family:'Baloo 2',cursive}

/* ---- quiz ---- */
.progress{height:14px;background:#fff;border:2px solid var(--ink);border-radius:999px;overflow:hidden;margin-bottom:6px}
.progress .fill{height:100%;background:linear-gradient(90deg,var(--star),#ffb020);width:0%;transition:width .35s;border-radius:999px}
.pcount{font-size:13px;font-weight:800;color:var(--ink-dark);text-align:right;margin-bottom:12px}

.passage{
  background:#fff;border:2px dashed var(--red);border-radius:14px;padding:12px 14px;
  font-size:15px;line-height:1.65;margin-bottom:14px;font-weight:600;color:#4d443a;
}
.passage .pt{font-family:'Baloo 2',cursive;color:#a02730;text-align:center;margin-bottom:4px;font-size:16px}

.qbox{background:#fff;border:2.5px solid var(--ink);border-radius:18px;padding:18px;box-shadow:0 4px 0 var(--ink)}
.qtext{font-size:19px;font-weight:800;color:var(--ink-dark);line-height:1.5;font-family:'Baloo 2',cursive}
.answers{display:grid;gap:11px;margin-top:16px}
.ans{
  border:2.5px solid #cfc6ae;background:#fffdf7;border-radius:14px;padding:14px 14px;
  font-size:17px;font-weight:800;text-align:left;cursor:pointer;font-family:'Nunito',sans-serif;
  color:var(--text);display:flex;align-items:center;gap:10px;min-height:56px;
}
.ans .key{
  flex:none;width:30px;height:30px;border-radius:9px;background:var(--ink);color:#fff;
  display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:15px;
}
.ans:active{background:#fff3d6}
.ans.correct{border-color:var(--green);background:#e9f9ef}
.ans.correct .key{background:var(--green)}
.ans.wrong{border-color:var(--red);background:#fdeaec}
.ans.wrong .key{background:var(--red)}
.ans:disabled{cursor:default;opacity:1}
.ans.dim{opacity:.45}

.numpad{margin-top:16px}
.numshow{
  border:2.5px dashed var(--ink);border-radius:14px;min-height:60px;display:flex;align-items:center;
  justify-content:center;font-family:'Baloo 2',cursive;font-size:32px;color:var(--ink-dark);background:#fffdf7;
  letter-spacing:4px;
}
.pads{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}
.pad{
  border:2px solid var(--ink);background:#fff;border-radius:12px;padding:13px 0;font-size:20px;
  font-family:'Baloo 2',cursive;color:var(--ink-dark);cursor:pointer;box-shadow:0 3px 0 var(--ink);
}
.pad:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}
.pad.act{background:var(--star);border-color:#d99a00;box-shadow:0 3px 0 #d99a00;color:#6b4b00}

.feedback{
  margin-top:14px;border-radius:14px;padding:13px 15px;font-weight:800;font-size:16px;display:none;
  animation:pop .25s;
}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.feedback.ok{display:block;background:#e9f9ef;border:2px solid var(--green);color:#1e7a47}
.feedback.no{display:block;background:#fdeaec;border:2px solid var(--red);color:#a02730}

.nextbtn{
  margin-top:16px;width:100%;border:none;background:var(--ink);color:#fff;font-family:'Baloo 2',cursive;
  font-size:20px;padding:15px;border-radius:16px;cursor:pointer;box-shadow:0 4px 0 var(--ink-dark);display:none;
}
.nextbtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink-dark)}
.nextbtn.show{display:block}

/* ---- order / match / svg ---- */
.qsvgwrap{margin-top:12px;text-align:center}
.qsvg{width:150px;height:auto}
.qsvg.wide{width:230px}
.slots{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.slot{min-width:54px;height:50px;border:2.5px dashed var(--ink);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:18px;color:var(--ink-dark);background:#fffdf7;padding:0 10px}
.slot.ok{border-color:var(--green);border-style:solid;background:#e9f9ef}
.slot.no{border-color:var(--red);border-style:solid;background:#fdeaec}
.pool{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:12px}
.pill{border:2px solid var(--ink);background:#fff;border-radius:12px;padding:11px 15px;font-family:'Baloo 2',cursive;font-size:18px;color:var(--ink-dark);box-shadow:0 3px 0 var(--ink);cursor:pointer}
.pill:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}
.pill.used{opacity:.22;pointer-events:none}
.matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.mbtn{width:100%;border:2.5px solid #cfc6ae;background:#fffdf7;border-radius:12px;padding:13px 6px;font-family:'Baloo 2',cursive;font-size:16.5px;color:var(--text);cursor:pointer;margin-bottom:9px;min-height:54px}
.mbtn.sel{border-color:var(--ink);background:#eaf1ff}
.ctrlrow{display:flex;gap:10px;margin-top:12px}
.ctrlrow .pad{flex:1}

/* ---- result ---- */
.result{text-align:center;padding-top:30px}
.result .big{font-size:78px;line-height:1;animation:bounce .8s}
@keyframes bounce{0%{transform:scale(.3)}55%{transform:scale(1.15)}100%{transform:scale(1)}}
.result h2{font-size:28px;color:var(--ink-dark);margin-top:8px}
.scorecard{
  background:#fff;border:2.5px solid var(--star);border-radius:20px;padding:18px;margin:18px auto;
  max-width:320px;box-shadow:0 4px 0 #d99a00;
}
.scorecard .num{font-family:'Baloo 2',cursive;font-size:56px;color:var(--red)}
.scorecard .num small{font-size:24px;color:#9a917d}
.scorecard .msg{font-weight:800;color:#6b4b00;font-size:16px;margin-top:2px}
.stars{font-size:30px;letter-spacing:4px;margin-top:6px}
.rbtns{display:grid;gap:12px;max-width:320px;margin:0 auto}
.rbtn{border:2.5px solid var(--ink);background:#fff;color:var(--ink-dark);border-radius:14px;padding:14px;
  font-family:'Baloo 2',cursive;font-size:18px;cursor:pointer;box-shadow:0 3px 0 var(--ink)}
.rbtn.primary{background:var(--ink);color:#fff;box-shadow:0 3px 0 var(--ink-dark)}
.rbtn:active{transform:translateY(2px)}

.confetti{position:fixed;top:-12px;font-size:22px;z-index:50;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(560deg)}}

/* ---- công cụ trang chính ---- */
.hometools{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
.tool{flex:1;min-width:150px;border:2px solid var(--ink);background:#fff;color:var(--ink-dark);
  border-radius:14px;padding:12px;font-family:'Baloo 2',cursive;font-size:15px;cursor:pointer;box-shadow:0 3px 0 var(--ink)}
.tool:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}
.tool.danger{border-color:var(--red);color:#a02730;box-shadow:0 3px 0 var(--red)}

/* ---- xem lại câu sai ---- */
.review{max-width:340px;margin:6px auto 4px;text-align:left}
.rvtitle{font-family:'Baloo 2',cursive;color:#a02730;font-size:17px;text-align:center;margin-bottom:10px}
.rvitem{background:#fff;border:2px solid var(--line);border-left:5px solid var(--red);
  border-radius:12px;padding:11px 13px;margin-bottom:10px}
.rvq{font-weight:800;color:var(--ink-dark);font-size:15px;margin-bottom:4px}
.rva{font-size:14px;color:#1e7a47;font-weight:700}
.rve{font-size:13px;color:#7a715e;font-weight:600;margin-top:3px}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ================= HÌNH VẼ (SVG) ================= */
function clockSVG(h){
  let nums = '';
  for(let n=1;n<=12;n++){
    const a = n*30*Math.PI/180;
    const x = 50 + 36*Math.sin(a), y = 50 - 36*Math.cos(a) + 3.5;
    nums += `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" font-size="10" font-weight="bold" fill="#1D3F7A" font-family="Baloo 2,cursive">${n}</text>`;
  }
  const angle = (h%12)*30;
  return `<svg viewBox="0 0 100 100" class="qsvg">
    <circle cx="50" cy="50" r="47" fill="#fff" stroke="#2B5FB8" stroke-width="4"/>
    ${nums}
    <line x1="50" y1="50" x2="50" y2="16" stroke="#E84855" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="50" y2="30" stroke="#1D3F7A" stroke-width="4" stroke-linecap="round" transform="rotate(${angle} 50 50)"/>
    <circle cx="50" cy="50" r="3.5" fill="#1D3F7A"/>
  </svg>`;
}
const SVG_SQ_DIAG = `<svg viewBox="0 0 100 100" class="qsvg"><rect x="10" y="10" width="80" height="80" fill="#FFF3D6" stroke="#2B5FB8" stroke-width="4"/><line x1="10" y1="10" x2="90" y2="90" stroke="#2B5FB8" stroke-width="4"/></svg>`;

  {q:'Hôm nay là thứ Bảy. Ngày mai là thứ mấy?', a:['Thứ Sáu','Chủ nhật','Thứ Hai','Thứ Bảy'], c:1, e:'Sau thứ Bảy là Chủ nhật.'},

},
{

/* ================= TRẠNG THÁI & LƯU ĐIỂM ================= */
const app = document.getElementById('app');
let best = {}, totalStars = 0, soundOn = true;
const STORE_KEY = 'betap-progress';

/* Trộn ngẫu nhiên (Fisher–Yates) — chống học vẹt theo vị trí khi làm lại. */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

/* ---- Âm thanh (Web Audio, không cần file) ---- */
let audioCtx = null;
function tone(freq, start, dur, type, vol){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
  const t=audioCtx.currentTime+start;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.start(t); o.stop(t+dur+0.03);
}
function beep(kind){
  if(!soundOn) return;
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    if(kind==='ok'){ tone(660,0,0.15,'triangle',0.18); tone(988,0.12,0.24,'triangle',0.18); }
    else { tone(220,0,0.24,'sine',0.16); tone(160,0.1,0.3,'sine',0.16); }
  }catch(e){}
}
async function toggleSound(){
  soundOn = !soundOn;
  await saveProgress();
  const b=document.getElementById('soundBtn');
  if(b) b.textContent = soundOn ? '🔊 Âm thanh: Bật' : '🔇 Âm thanh: Tắt';
  if(soundOn) beep('ok');
}

/* Lưu tiến độ: ưu tiên host storage (nếu có), nếu không thì dùng localStorage
   để điểm số & số sao vẫn được giữ lại khi mở file trên trình duyệt thường. */
const Store = {
  async get(key){
    try{ if(window.storage && window.storage.get){ const r = await window.storage.get(key); return r && r.value != null ? r.value : null; } }catch(e){}
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  },
  async set(key, val){
    try{ if(window.storage && window.storage.set){ await window.storage.set(key, val); return; } }catch(e){}
    try{ localStorage.setItem(key, val); }catch(e){}
  }
};

async function loadSaved(){
  try{
    const raw = await Store.get(STORE_KEY);
    if(raw){ const d = JSON.parse(raw); best = d.best || {}; totalStars = d.stars || 0; soundOn = d.sound !== false; }
  }catch(e){ /* chưa có dữ liệu — bắt đầu mới */ }
}
async function saveProgress(){
  await Store.set(STORE_KEY, JSON.stringify({best, stars: totalStars, sound: soundOn}));
}
async function resetProgress(){
  if(!confirm('Xoá toàn bộ điểm số và số sao đã lưu? Không thể hoàn tác.')) return;
  best = {}; totalStars = 0;
  await saveProgress();
  home();
}

/* ================= MÀN HÌNH CHÍNH ================= */
const SUBJECT_META = { toan:{name:'Toán', emoji:'🔢'}, tv:{name:'Tiếng Việt', emoji:'📖'} };

function quizCard(qz){
  const b = best[qz.id];
  const shortTitle = qz.title.replace(/^[^–]*–\s*/, ''); // bỏ tiền tố "Môn – " vì đã có tiêu đề môn
  return `<div class="card ${qz.subject==='tv'?'tv':''}" onclick="startQuiz('${qz.id}')">
      <div class="icon">${qz.icon}</div>
      <div><div class="t">${shortTitle}</div><div class="d">${qz.desc} · ${qz.questions.length} câu</div></div>
      <div class="best">${b!=null?`Điểm tốt nhất<b>${b}/${qz.questions.length}</b>`:''}</div>
    </div>`;
}

/* Màn hình chính: chỉ chọn MÔN */
function home(){
  const order = [];
  QUIZZES.forEach(q=>{ if(!order.includes(q.subject)) order.push(q.subject); });
  const cards = order.map(sub=>{
    const items = QUIZZES.filter(q=>q.subject===sub);
    const m = SUBJECT_META[sub] || {name:sub, emoji:'📚'};
    const done = items.filter(q=>best[q.id]!=null).length;
    const stars = items.reduce((s,q)=> s + (best[q.id]||0), 0);       // tổng điểm tốt nhất
    const maxStars = items.reduce((s,q)=> s + q.questions.length, 0); // số sao tối đa của môn
    return `<div class="subjcard ${sub==='tv'?'tv':''}" onclick="openSubject('${sub}')">
      <div class="sc-emoji">${m.emoji}</div>
      <div class="sc-body">
        <div class="sc-name">${m.name}</div>
        <div class="sc-meta">${items.length} đề · đã làm ${done}/${items.length}</div>
        <div class="sc-stars">⭐ ${stars}/${maxStars} sao</div>
      </div>
      <div class="sc-arrow">›</div>
    </div>`;
  }).join('');
  const allStars = QUIZZES.reduce((s,q)=> s + (best[q.id]||0), 0); // tổng = Toán + Tiếng Việt
  app.innerHTML = `
    <div class="hero">
      <div class="mascot">🦉</div>
      <h1>Bé Ôn Tập <span class="accent">Hè</span></h1>
      <p>Lớp 1 lên Lớp 2 · sách Kết nối tri thức</p>
      <div class="starbar">⭐ ${allStars} ngôi sao đã đạt được</div>
    </div>
    <div class="subjectpick">${cards}</div>
    <div class="hometools">
      <button class="tool" id="soundBtn" onclick="toggleSound()">${soundOn ? '🔊 Âm thanh: Bật' : '🔇 Âm thanh: Tắt'}</button>
      <button class="tool danger" onclick="resetProgress()">🗑️ Xoá tiến độ</button>
    </div>`;
  window.scrollTo(0,0);
}

/* Màn hình danh sách ĐỀ của một môn */
function openSubject(sub){
  const items = QUIZZES.filter(q=>q.subject===sub);
  const m = SUBJECT_META[sub] || {name:sub, emoji:'📚'};
  app.innerHTML = `
    <div class="top">
      <button class="back" onclick="home()">←</button>
      <div class="crumb">${m.emoji} ${m.name} · ${items.length} đề</div>
    </div>
    <div class="subject" style="margin-top:8px">${items.map(quizCard).join('')}</div>`;
  window.scrollTo(0,0);
}

/* ================= LÀM BÀI ================= */
let cur = null, idx = 0, score = 0, numInput = '', wrongs = [];

function startQuiz(id){
  const quiz = QUIZZES.find(q=>q.id===id);
  // Trộn thứ tự câu (giữ nguyên dữ liệu gốc bằng cách xáo trên bản sao)
  cur = Object.assign({}, quiz, {questions: shuffle(quiz.questions.slice())});
  idx = 0; score = 0; wrongs = [];
  renderQuestion();
}

function renderQuestion(){
  const q = cur.questions[idx];
  numInput = '';
  const pct = Math.round(idx / cur.questions.length * 100);
  let body = '';
  if(q.type === 'num'){
    body = `<div class="numpad">
      <div class="numshow" id="numshow">?</div>
      <div class="pads">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pad" onclick="tapPad('${n}')">${n}</button>`).join('')}
        <button class="pad" onclick="tapPad('del')">⌫</button>
        <button class="pad" onclick="tapPad('0')">0</button>
        <button class="pad act" onclick="checkNum()">✔ Xong</button>
      </div>
    </div>`;
  } else if(q.type === 'order'){
    orderPicked = [];
    const poolOrder = shuffle(q.items.map((_,i)=>i));
    body = `<div class="slots" id="slots">${q.items.map(()=>'<div class="slot">·</div>').join('')}</div>
      <div class="pool" id="pool">${poolOrder.map(i=>`<button class="pill" id="pill${i}" onclick="tapOrder(${i})">${q.items[i]}</button>`).join('')}</div>
      <div class="ctrlrow">
        <button class="pad" onclick="resetOrder()">↺ Xếp lại</button>
        <button class="pad act" onclick="checkOrder()">✔ Xong</button>
      </div>`;
  } else if(q.type === 'match'){
    matchSel = -1; matchPairs = {};
    body = `<div class="matchgrid">
      <div>${q.left.map((l,i)=>`<button class="mbtn" id="L${i}" onclick="tapLeft(${i})">${l}</button>`).join('')}</div>
      <div>${shuffle(q.right.map((_,j)=>j)).map(j=>`<button class="mbtn" id="R${j}" onclick="tapRight(${j})">${q.right[j]}</button>`).join('')}</div>
    </div>
    <button class="pad act" style="width:100%;margin-top:12px" onclick="checkMatch()">✔ Xong</button>`;
  } else {
    const keys = ['A','B','C','D'];
    // Trộn vị trí đáp án; data-oi giữ chỉ số gốc để chấm đúng
    const optOrder = shuffle(q.a.map((_,i)=>i));
    body = `<div class="answers">
      ${optOrder.map((oi,disp)=>`<button class="ans" data-oi="${oi}" onclick="checkChoice(${oi})"><span class="key">${keys[disp]}</span>${q.a[oi]}</button>`).join('')}
    </div>`;
  }
  app.innerHTML = `
    <div class="top">
      <button class="back" onclick="confirmExit()">←</button>
      <div class="crumb">${cur.icon} ${cur.title}</div>
    </div>
    <div class="progress"><div class="fill" style="width:${pct}%"></div></div>
    <div class="pcount">Câu ${idx+1} / ${cur.questions.length} · ⭐ ${score}</div>
    ${cur.passage && idx===0 ? `<div class="passage"><div class="pt">📖 ${cur.passage.title}</div>${cur.passage.text}</div>`:''}
    ${cur.passage && idx>0 ? `<details class="passage" style="border-style:solid"><summary style="font-weight:800;color:#a02730;cursor:pointer">📖 Xem lại bài đọc</summary><div style="margin-top:6px">${cur.passage.text}</div></details>`:''}
    <div class="qbox">
      <div class="qtext">${q.q}</div>
      ${q.svg ? `<div class="qsvgwrap">${q.svg}</div>` : ''}
      ${body}
      <div class="feedback" id="fb"></div>
      <button class="nextbtn" id="next" onclick="nextQ()">Câu tiếp theo →</button>
    </div>`;
  window.scrollTo(0,0);
}

function tapPad(v){
  if(v==='del') numInput = numInput.slice(0,-1);
  else if(numInput.length < 3) numInput += v;
  document.getElementById('numshow').textContent = numInput || '?';
}

function checkNum(){
  if(!numInput) return;
  const q = cur.questions[idx];
  const right = numInput === q.c;
  finish(right, q);
  document.getElementById('numshow').style.borderColor = right ? 'var(--green)' : 'var(--red)';
  document.getElementById('numshow').textContent = numInput + (right ? ' ✔' : ' ✘');
  document.querySelectorAll('.pad').forEach(b=>b.disabled=true);
}

/* ---- dạng SẮP XẾP ---- */
let orderPicked = [];
function tapOrder(i){
  const q = cur.questions[idx];
  if(orderPicked.includes(i) || orderPicked.length >= q.items.length) return;
  orderPicked.push(i);
  document.getElementById('pill'+i).classList.add('used');
  const slots = document.querySelectorAll('#slots .slot');
  slots[orderPicked.length-1].textContent = q.items[i];
}
function resetOrder(){
  orderPicked = [];
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('used'));
  document.querySelectorAll('#slots .slot').forEach(s=>{s.textContent='·';s.classList.remove('ok','no')});
}
function checkOrder(){
  const q = cur.questions[idx];
  if(orderPicked.length < q.items.length) return;
  const values = orderPicked.map(i=>q.items[i]);
  const slots = document.querySelectorAll('#slots .slot');
  let right = true;
  values.forEach((v,k)=>{
    const ok = v === q.c[k];
    slots[k].classList.add(ok?'ok':'no');
    if(!ok) right = false;
  });
  document.querySelectorAll('.pill,.pad').forEach(b=>b.disabled=true);
  finish(right, q);
}

/* ---- dạng NỐI ---- */
let matchSel = -1, matchPairs = {};
const PAIRCOLORS = ['#FFE3A3','#BFE8D2','#F8C6CE','#C3D8F8'];
function paintPair(i, j, on){
  const L = document.getElementById('L'+i), R = document.getElementById('R'+j);
  const col = on ? PAIRCOLORS[i % PAIRCOLORS.length] : '#fffdf7';
  L.style.background = col; R.style.background = col;
  L.style.borderColor = on ? '#b89a4a' : '#cfc6ae';
  R.style.borderColor = on ? '#b89a4a' : '#cfc6ae';
}
function tapLeft(i){
  if(matchPairs[i] !== undefined){ paintPair(i, matchPairs[i], false); delete matchPairs[i]; }
  document.querySelectorAll('.matchgrid .mbtn').forEach(b=>b.classList.remove('sel'));
  matchSel = i;
  document.getElementById('L'+i).classList.add('sel');
}
function tapRight(j){
  if(matchSel < 0) return;
  for(const li in matchPairs){ if(matchPairs[li] === j){ paintPair(+li, j, false); delete matchPairs[li]; } }
  matchPairs[matchSel] = j;
  paintPair(matchSel, j, true);
  document.getElementById('L'+matchSel).classList.remove('sel');
  matchSel = -1;
}
function checkMatch(){
  const q = cur.questions[idx];
  if(Object.keys(matchPairs).length < q.left.length) return;
  let right = true;
  for(let i=0;i<q.left.length;i++){ if(matchPairs[i] !== q.pairs[i]) right = false; }
  document.querySelectorAll('.mbtn,.pad').forEach(b=>b.disabled=true);
  finish(right, q);
}

function checkChoice(i){
  const q = cur.questions[idx];
  const right = i === q.c;
  document.querySelectorAll('.ans').forEach(b=>{
    const oi = +b.dataset.oi;
    b.disabled = true;
    if(oi === q.c) b.classList.add('correct');
    else if(oi === i && !right) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  finish(right, q);
}

function correctAnswerText(q){
  if(q.type === 'num') return q.c;
  if(q.type === 'order') return q.c.join('  ');
  if(q.type === 'match') return q.left.map((l,i)=>`${l} → ${q.right[q.pairs[i]]}`).join('; ');
  return q.a[q.c];
}

function finish(right, q){
  const fb = document.getElementById('fb');
  const praise = ['Giỏi quá! 🎉','Chính xác! 🌟','Tuyệt vời! 👏','Bé làm đúng rồi! 💯'];
  beep(right ? 'ok' : 'no');
  if(right){
    score++;
    fb.className = 'feedback ok';
    fb.innerHTML = praise[Math.floor(Math.random()*praise.length)] + '<br><span style="font-weight:700;font-size:14px">' + q.e + '</span>';
    dropConfetti(6);
  } else {
    wrongs.push({q:q.q, correct:correctAnswerText(q), e:q.e});
    fb.className = 'feedback no';
    fb.innerHTML = 'Chưa đúng, không sao nhé! 💪<br><span style="font-weight:700;font-size:14px">' + q.e + '</span>';
  }
  const nx = document.getElementById('next');
  nx.classList.add('show');
  if(idx === cur.questions.length - 1) nx.textContent = 'Xem kết quả 🏁';
}

function nextQ(){
  idx++;
  if(idx < cur.questions.length) renderQuestion();
  else showResult();
}

function confirmExit(){
  const backToList = () => openSubject(cur.subject);
  if(idx===0 && score===0){ backToList(); return; }
  if(confirm('Bé muốn dừng bài này và chọn đề khác?')) backToList();
}

/* ================= KẾT QUẢ ================= */
async function showResult(){
  const total = cur.questions.length;
  const prevBest = best[cur.id] ?? -1;
  if(score > prevBest){ best[cur.id] = score; }
  totalStars = QUIZZES.reduce((s,q)=> s + (best[q.id]||0), 0); // tổng điểm tốt nhất mọi đề
  await saveProgress();

  const ratio = score/total;
  let face='🌱', msg='Cố gắng thêm chút nữa nhé, bé làm lại nào!';
  if(ratio===1){ face='🏆'; msg='Xuất sắc! Bé đạt điểm tuyệt đối!'; }
  else if(ratio>=0.8){ face='🌟'; msg='Giỏi lắm! Bé sắp đạt điểm tối đa rồi!'; }
  else if(ratio>=0.5){ face='😊'; msg='Khá tốt! Ôn thêm một chút là giỏi ngay!'; }
  const starCount = ratio===1?3:ratio>=0.8?2:ratio>=0.5?1:0;
  const starsHtml = '⭐'.repeat(starCount) + '<span style="opacity:.25">' + '⭐'.repeat(3-starCount) + '</span>';

  app.innerHTML = `
    <div class="result">
      <div class="big">${face}</div>
      <h2>Hoàn thành ${cur.title}!</h2>
      <div class="scorecard">
        <div class="num">${score}<small>/${total}</small></div>
        <div class="stars">${starsHtml}</div>
        <div class="msg">${msg}</div>
        ${score > prevBest && prevBest >= 0 ? '<div class="msg" style="color:var(--green)">🎉 Kỷ lục mới!</div>':''}
      </div>
      ${wrongs.length ? `<div class="review">
        <div class="rvtitle">📌 Xem lại câu chưa đúng (${wrongs.length})</div>
        ${wrongs.map(w=>`<div class="rvitem">
          <div class="rvq">${w.q}</div>
          <div class="rva">✅ Đáp án đúng: <b>${w.correct}</b></div>
          <div class="rve">${w.e}</div>
        </div>`).join('')}
      </div>` : ''}
      <div class="rbtns">
        <button class="rbtn primary" onclick="startQuiz('${cur.id}')">🔁 Làm lại đề này</button>
        <button class="rbtn" onclick="openSubject('${cur.subject}')">📚 Chọn đề khác</button>
        <button class="rbtn" onclick="home()">🏠 Trang chính</button>
      </div>
    </div>`;
  if(ratio>=0.8) dropConfetti(26);
  window.scrollTo(0,0);
}

/* ================= HIỆU ỨNG ================= */
function dropConfetti(n){
  const em = ['🎉','⭐','🌟','🎈','✨'];
  for(let i=0;i<n;i++){
    const s = document.createElement('div');
    s.className='confetti';
    s.textContent = em[Math.floor(Math.random()*em.length)];
    s.style.left = Math.random()*100+'vw';
    s.style.animationDuration = (1.4+Math.random()*1.4)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 3200);
  }
}

/* ================= BÀN PHÍM (cho câu điền số) ================= */
document.addEventListener('keydown', e=>{
  const show = document.getElementById('numshow');
  if(!show) return;                                   // chỉ dùng khi đang ở câu điền số
  if(document.querySelector('.numpad .pad:disabled')) return; // đã trả lời xong
  if(e.key >= '0' && e.key <= '9'){ tapPad(e.key); }
  else if(e.key === 'Backspace'){ tapPad('del'); e.preventDefault(); }
  else if(e.key === 'Enter'){ checkNum(); }
});

/* ================= KHỞI ĐỘNG ================= */
loadSaved().then(home);
</script>
